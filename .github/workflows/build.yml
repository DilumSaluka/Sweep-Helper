name: Build EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run build

      - name: Create portable zip
        run: $ver = (Get-Content package.json | ConvertFrom-Json).version; Compress-Archive -Path "release\win-unpacked\*" -DestinationPath "release\Sweep-Helper-Portable-$ver.zip" -Force

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Sweep-Helper-Installer
          path: |
            release/*.exe
            release/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
          generate_release_notes: true
